services:
  - type: web
    name: placas-api
    runtime: python
    buildCommand: pip install -r requirements_api.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port 10000
    envVars:
      - key: HF_TOKEN
        sync: false
      - key: PYTHONPATH
        value: .
    healthCheckPath: /health